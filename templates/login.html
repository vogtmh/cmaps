<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{.AppTitle}} — Sign in</title>
  <link rel="stylesheet" href="/static/cmaps.css?v={{assetver}}" />
  <style>
    html, body { height: 100%; margin: 0; }
    body { background: #000 url("/static/images/background.png"); }
  </style>
</head>
<body>
  <script src="/static/login.js?v={{assetver}}"></script>
  <script>
    window.cmapsAuth = {
      loggedIn:     false,
      samlEnabled:  {{if .SAMLEnabled}}true{{else}}false{{end}},
      samlFallback: true,
      samlUrl:      "/auth/saml/login",
      next:         "{{.Next}}",
      error:        "{{.Error}}",
      appTitle:     "{{.AppTitle}}",
      logoUrl:      "{{.LogoRegular}}",
      loginPage:    true
    };
    cmapsLogin();
  </script>
</body>
</html>
