<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{.AppTitle}} — Sign in</title>
  <link rel="stylesheet" href="/static/cmaps80.css?v={{assetver}}" />
  <style>
    body { font-family: system-ui, sans-serif; background: #f4f5f7; margin: 0; }
    .login_wrap { max-width: 360px; margin: 8% auto; background: #fff; padding: 32px;
      border-radius: 10px; box-shadow: 0 2px 16px rgba(0,0,0,.08); }
    .login_wrap h1 { font-size: 1.4em; margin: 0 0 4px; }
    .login_wrap p.sub { color: #666; margin: 0 0 24px; font-size: .9em; }
    .login_field { width: 100%; padding: 10px; margin: 6px 0; box-sizing: border-box;
      border: 1px solid #ccc; border-radius: 6px; font-size: 1em; }
    .login_btn { width: 100%; padding: 11px; margin-top: 12px; border: 0; border-radius: 6px;
      background: #0a66c2; color: #fff; font-size: 1em; cursor: pointer; }
    .login_btn_sso { background: #2e7d32; }
    .login_err { color: #c0392b; font-size: .9em; margin: 8px 0 0; min-height: 1.2em; }
    .login_hint { color: #888; font-size: .8em; margin-top: 18px; text-align: center; }
  </style>
</head>
<body>
  <div class="login_wrap">
    <h1>{{.AppTitle}}</h1>
    <p class="sub">CompanyMaps 9</p>
    <form method="POST" action="/login">
      <input type="hidden" name="next" value="{{.Next}}" />
      <input class="login_field" type="text" name="username" placeholder="Username" autofocus autocomplete="username" />
      <input class="login_field" type="password" name="password" placeholder="Password" autocomplete="current-password" />
      <button class="login_btn" type="submit">Sign in</button>
    </form>
    {{if .SAMLEnabled}}
    <button class="login_btn login_btn_sso" onclick="window.location.href='{{.SAMLLoginURL}}'">Sign in with SSO</button>
    {{end}}
    <div class="login_err">{{.Error}}</div>
    <div class="login_hint">Local admin: use the password from config.json{{if .SAMLEnabled}}, or sign in with SSO{{end}}.</div>
  </div>
</body>
</html>
